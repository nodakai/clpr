[pytest]
testpaths = pipeline/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=pipeline
    --cov-report=term-missing
    --cov-report=html
    --cov-config=pytest.ini
    --strict-markers
markers =
    integration: integration tests requiring real AWS credentials (may be slow)
    optional: tests that are not essential for CI
